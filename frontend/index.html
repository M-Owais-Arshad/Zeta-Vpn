<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>ZetaVPN Panel</title>
  <link rel="icon" href="assets/img/logo.png" type="image/png" />
  <link rel="stylesheet" href="assets/css/zeta.css?v=1.3.1" />
</head>
<body>
  <!-- ===================== Login ===================== -->
  <div id="login-view" class="auth-wrap">
    <div class="auth-card">
      <div class="brand"><img class="logo" src="assets/img/logo.png" alt="" /><span class="name">Zeta<b>VPN</b></span></div>
      <h1>Welcome back</h1>
      <p class="sub">Sign in to the control panel</p>
      <form id="login-form">
        <div class="field"><label>Username</label><input id="l-user" autocomplete="username" required /></div>
        <div class="field"><label>Password</label><input id="l-pass" type="password" autocomplete="current-password" required /></div>
        <div class="field hidden" id="l-totp-field"><label>2FA code</label><input id="l-totp" inputmode="numeric" autocomplete="one-time-code" placeholder="123456" /></div>
        <p class="form-error" id="login-err"></p>
        <button class="btn primary block" id="login-btn" type="submit">Sign in</button>
        <p class="hint center"><a href="#" id="l-totp-toggle">Have a 2FA code?</a></p>
      </form>
    </div>
  </div>

  <!-- ===================== App ===================== -->
  <div id="app-view" class="app hidden">
    <div id="scrim" class="scrim"></div>
    <aside class="sidebar">
      <div class="brand"><img class="logo" src="assets/img/logo.png" alt="" /><span class="name">Zeta<b>VPN</b></span></div>
      <a class="nav-item" data-view="dashboard" href="#/dashboard">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Dashboard
      </a>
      <a class="nav-item" data-view="inbounds" href="#/inbounds">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
        Inbounds
      </a>
      <a class="nav-item" data-view="clients" href="#/clients">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8M23 21v-2a4 4 0 0 0-3-3.9M16 3.1a4 4 0 0 1 0 7.8"/></svg>
        Clients
      </a>
      <a class="nav-item" data-view="ssh" href="#/ssh">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 9l3 3-3 3M13 15h4"/></svg>
        SSH Accounts
      </a>
      <a class="nav-item" data-view="tuning" href="#/tuning">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h7l-1 8 11-14h-7l1-6z"/></svg>
        Boost
      </a>
      <a class="nav-item" data-view="settings" href="#/settings">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 6.6 19l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 4 12.6H3.9a2 2 0 1 1 0-4H4a1.6 1.6 0 0 0 1.5-2.7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 11 3.9V3.9a2 2 0 1 1 4 0V4a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1A1.6 1.6 0 0 0 20.1 11H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>
        Settings
      </a>
      <div class="spacer"></div>
      <a class="nav-item logout" id="logout" href="#">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Sign out
      </a>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="tb-left">
          <button id="menu-toggle" class="icon-btn menu-toggle" type="button" aria-label="Toggle menu">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div>
            <h2 id="page-title">Dashboard</h2>
            <div class="who" id="page-sub"></div>
          </div>
        </div>
        <div class="who">Signed in as <b id="who">—</b></div>
      </div>
      <div id="page"></div>
    </main>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root" class="toasts"></div>

  <script src="assets/js/api.js?v=1.3.1"></script>
  <script src="assets/js/app.js?v=1.3.1"></script>
</body>
</html>
