name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11", "3.12" ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Compile-check all modules
        working-directory: backend
        run: python -m compileall -q zeta
      - name: Run tests
        working-directory: backend
        run: python -m pytest

  frontend:
    name: Frontend syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax-check the JS
        run: |
          node --check frontend/assets/js/app.js
          node --check frontend/assets/js/api.js

  scripts:
    name: Shell lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          # -S warning: fail on warnings+; scripts are POSIX-ish bash
          shellcheck -S warning -e SC1091 install.sh scripts/*.sh bin/zeta || true
      - name: bash -n (parse) — hard gate
        run: |
          for f in install.sh scripts/*.sh bin/zeta scripts/zeta-privileged; do
            bash -n "$f" && echo "ok  $f"
          done
